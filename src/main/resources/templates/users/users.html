<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Users</title>
    <style>
        /* Стили для таблицы */
        table {
            width: 50%;
            border-collapse: collapse; /* Убирает двойные границы */
            margin: 20px 0;
            font-family: Arial, sans-serif;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2; /* Цвет фона для заголовков */
            font-weight: bold;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9; /* Чередующийся цвет строк */
        }

        tr:hover {
            background-color: #f1f1f1; /* Цвет строки при наведении */
        }

        /* Стили для сообщений */
        .success-message {
            color: green;
            margin-bottom: 10px;
        }

        .error-message {
            color: red;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<!-- Вывод сообщения об успешной операции, если оно есть -->
<div th:if="${successMessage}" class="success-message">
    <p th:text="${successMessage}"></p>
</div>

<!-- Вывод сообщения об ошибке, если оно есть -->
<div th:if="${errorMessage}" class="error-message">
    <p th:text="${errorMessage}"></p>

    <p>Но вы можете добавить нового пользователя</p>

    <form th:method="GET" th:action="@{/users/new}">
        <input type="submit" value="Добавить нового пользователя"/>
    </form>

    <p>или вернуться</p>

    <a th:href="@{/users}"><<< назад к списку пользователей</a>
</div>

<!-- Таблица отображается только если нет ошибки -->
<div th:if="${errorMessage == null}">
    <form th:method="GET" th:action="@{/users/new}">
        <input type="submit" value="Добавить нового пользователя"/>
    </form>
    <h1>Список пользователей</h1>
    <table>
        <thead>
        <tr>
            <th>id</th>
            <th>Имя</th>
            <th>Возраст</th>
            <th>email</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${users}" style="cursor: pointer;"
            th:onclick="|window.location.href='@{/users/user(id=${user.id})}'|">
            <td th:text="${user.id}"></td>
            <td th:text="${user.name}"></td>
            <td th:text="${user.age}"></td>
            <td th:text="${user.email}"></td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
