<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User</title>
    <style>
        /* Стили для таблицы */
        table {
            width: 50%;
            border-collapse: collapse; /* Убирает двойные границы */
            margin: 20px 0;
            font-family: Arial, sans-serif;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2; /* Цвет фона для заголовков */
            font-weight: bold;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9; /* Чередующийся цвет строк */
        }

        tr:hover {
            background-color: #f1f1f1; /* Цвет строки при наведении */
        }
    </style>
</head>
<body>

<div>
    <h1>Пользователь</h1>
    <table>
        <thead>
        <tr>
            <th>id</th>
            <th>Имя</th>
            <th>Возраст</th>
            <th>email</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td th:text="${user.id}"></td>
            <td th:text="${user.name}"></td>
            <td th:text="${user.age}"></td>
            <td th:text="${user.email}"></td>
        </tr>
        </tbody>
    </table>
</div>

<form th:method="GET" th:action="@{/users/edit(id=${user.id})}" th:object="${user}">
    <input type="hidden" th:field="*{id}"/>

    <input type="submit" value="Редактировать"/>
</form>

<br/>

<form th:method="POST" th:action="@{/users/delete}" th:object="${user}">
    <input type="hidden" th:field="*{id}"/>

    <input type="submit" value="Удалить" th:onclick="return confirm('Вы уверены, что хотите удалить пользователя?')"/>
</form>

<hr/>

<a th:href="@{/users}"><<< назад к списку пользователей</a>

</body>
</html>
